<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pronto...</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose:      #d4a5a5;
      --rose-deep: #b07878;
      --gold:      #c9a96e;
      --gold-light:#f0dfc0;
      --cream:     #fdf8f2;
      --text-dark: #2c1f1f;
      --text-mid:  #6b4f4f;
      --text-soft: #a08080;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, #f9eee8 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 80%, #f0dfc0 0%, transparent 60%),
        linear-gradient(160deg, #fdf6f0 0%, #fdf0f5 50%, #f5ece0 100%);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      overflow: hidden;
      position: relative;
    }

    /* ── Canvas partículas ── */
    #canvas-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── Pétalos ── */
    #petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }
    .petal {
      position: absolute;
      top: -60px;
      animation: petalFall linear infinite;
      opacity: 0;
    }
    @keyframes petalFall {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(110vh) rotate(540deg) scale(0.5); opacity: 0; }
    }

    /* ── Anillos decorativos ── */
    .ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(212,165,165,0.25);
      pointer-events: none;
      z-index: 1;
    }
    .ring-a { width:600px; height:600px; top:-200px; right:-200px; animation: ringDrift 9s ease-in-out infinite; }
    .ring-b { width:380px; height:380px; bottom:-120px; left:-100px; animation: ringDrift 7s ease-in-out 1s infinite reverse; }
    @keyframes ringDrift {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(18px,-18px); }
    }

    /* ── Contenido central ── */
    .center {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 680px;
    }

    /* Ornamento superior */
    .ornament {
      font-size: 0.7rem;
      letter-spacing: 0.5rem;
      color: var(--gold);
      margin-bottom: 2.5rem;
      animation: fadeUp 1s ease 0.3s both;
    }

    /* Frase introductoria */
    .intro-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 2.8vw, 1.45rem);
      color: var(--text-mid);
      line-height: 1.85;
      margin-bottom: 3rem;
      animation: fadeUp 1s ease 0.6s both;
    }
    .intro-text em {
      color: var(--rose-deep);
      font-style: italic;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 3rem;
      animation: fadeUp 1s ease 0.9s both;
    }
    .divider .line { display:block; width:70px; height:1px; background:var(--gold); }
    .divider .gem  { color:var(--gold); font-size:0.55rem; }

    /* Contador */
    .countdown-grid {
      display: flex;
      justify-content: center;
      gap: clamp(0.8rem, 3vw, 2rem);
      margin-bottom: 2.5rem;
      animation: fadeUp 1s ease 1s both;
      flex-wrap: wrap;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .unit-box {
      background: white;
      border: 1px solid rgba(212,165,165,0.4);
      border-radius: 14px;
      padding: clamp(0.8rem, 2vw, 1.2rem) clamp(1rem, 2.5vw, 1.6rem);
      min-width: clamp(70px, 14vw, 100px);
      box-shadow: 0 8px 32px rgba(180,120,100,0.1);
      position: relative;
      overflow: hidden;
    }
    .unit-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(255,255,255,0.8) 0%, rgba(245,230,220,0.3) 100%);
    }

    .unit-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1;
      position: relative;
      z-index: 1;
      transition: transform 0.2s ease;
    }
    .unit-num.tick {
      animation: numTick 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes numTick {
      0%   { transform: translateY(-8px); opacity: 0.4; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    .unit-label {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    /* Separador : */
    .sep {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--rose);
      align-self: flex-start;
      padding-top: clamp(0.8rem, 2vw, 1.1rem);
      animation: sepPulse 1s ease-in-out infinite;
    }
    @keyframes sepPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.25; }
    }

    /* Fecha destino */
    .target-date {
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-soft);
      animation: fadeUp 1s ease 1.2s both;
    }
    .target-date span {
      color: var(--rose-deep);
    }

    /* Mensaje cuando llega el día */
    .arrived-msg {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-style: italic;
      color: var(--rose-deep);
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Footer mínimo */
    .page-footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--text-soft);
      z-index: 2;
    }
  </style>
</head>
<body>

  <canvas id="canvas-bg"></canvas>
  <div id="petals"></div>
  <div class="ring ring-a"></div>
  <div class="ring ring-b"></div>

  <div class="center">
    <p class="ornament">✦ &nbsp; &nbsp; ✦ &nbsp; &nbsp; ✦</p>

    <p class="intro-text">
      Hay cosas que se preparan con calma,<br/>
      con cuidado, con <em>amor</em>.<br/>
      Esta es una de ellas.<br/>
      Espera un poco más… vale la pena.
    </p>

    <div class="divider">
      <span class="line"></span>
      <span class="gem">◆</span>
      <span class="line"></span>
    </div>

    <div class="countdown-grid" id="countdownGrid">
      <div class="unit">
        <div class="unit-box"><div class="unit-num" id="cd-days">--</div></div>
        <span class="unit-label">Días</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="unit-box"><div class="unit-num" id="cd-hours">--</div></div>
        <span class="unit-label">Horas</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="unit-box"><div class="unit-num" id="cd-mins">--</div></div>
        <span class="unit-label">Minutos</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="unit-box"><div class="unit-num" id="cd-secs">--</div></div>
        <span class="unit-label">Segundos</span>
      </div>
    </div>

    <p class="arrived-msg" id="arrivedMsg">
      ¡El momento ha llegado! Abriendo tu sorpresa… 🌸
    </p>

    <p class="target-date">Hasta el <span>9 · Julio · 2026</span></p>
  </div>

  <p class="page-footer">algo especial se acerca &nbsp;✦</p>

  <script>
    // ── Partículas canvas ──
    (function() {
      const c = document.getElementById('canvas-bg');
      const ctx = c.getContext('2d');
      let W, H, pts = [];
      function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      const cols = ['#d4a5a5','#c9a96e','#f5e6e6','#f0dfc0','#b07878'];
      for (let i = 0; i < 70; i++) pts.push({
        x: Math.random()*1920, y: Math.random()*1080,
        r: 1+Math.random()*2.5, dx:(Math.random()-.5)*.35, dy:(Math.random()-.5)*.35,
        a: .15+Math.random()*.4, col: cols[Math.floor(Math.random()*cols.length)]
      });
      function draw() {
        ctx.clearRect(0,0,W,H);
        pts.forEach(p => {
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fillStyle=p.col; ctx.globalAlpha=p.a; ctx.fill();
          p.x+=p.dx; p.y+=p.dy;
          if(p.x<0||p.x>W) p.dx*=-1;
          if(p.y<0||p.y>H) p.dy*=-1;
        });
        ctx.globalAlpha=1;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // ── Pétalos ──
    (function() {
      const emojis = ['🌸','🌺','✿','❀','🌷','💮'];
      const cont = document.getElementById('petals');
      function spawn() {
        const el = document.createElement('span');
        el.className = 'petal';
        el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        el.style.left = Math.random()*100+'vw';
        el.style.fontSize = (.7+Math.random()*1.1)+'rem';
        const dur = 7+Math.random()*7;
        el.style.animationDuration = dur+'s';
        el.style.animationDelay = Math.random()*3+'s';
        cont.appendChild(el);
        setTimeout(()=>el.remove(),(dur+3)*1000);
      }
      for(let i=0;i<10;i++) setTimeout(spawn, i*400);
      setInterval(spawn, 1100);
    })();

    // ── Countdown ──
    const TARGET = new Date('2026-07-09T00:00:00');

    function pad(n) { return String(n).padStart(2,'0'); }

    function tick(id, val) {
      const el = document.getElementById(id);
      const newVal = pad(val);
      if (el.textContent !== newVal) {
        el.textContent = newVal;
        el.classList.remove('tick');
        void el.offsetWidth; // reflow
        el.classList.add('tick');
      }
    }

    function updateCountdown() {
      const now  = new Date();
      const diff = TARGET - now;

      if (diff <= 0) {
        // ¡Llegó el día! Mostrar mensaje y redirigir
        document.getElementById('countdownGrid').style.display = 'none';
        const msg = document.getElementById('arrivedMsg');
        msg.style.display = 'block';
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2800);
        return;
      }

      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000) / 60000);
      const secs  = Math.floor((diff % 60000) / 1000);

      tick('cd-days',  days);
      tick('cd-hours', hours);
      tick('cd-mins',  mins);
      tick('cd-secs',  secs);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
